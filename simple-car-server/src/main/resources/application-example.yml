server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /dev-api

spring:
  application:
    name: simple-car-server
  datasource:
    url: "${DB_URL:jdbc:mysql://localhost:3306/simple_car?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}"
    username: "${DB_USERNAME:root}"
    password: "${DB_PASSWORD:change-me}"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:5MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:10MB}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.nologging.NoLoggingImpl}
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: "${JWT_SECRET:replace-with-a-long-random-secret-at-least-32-bytes}"
  expiration: ${JWT_EXPIRATION:604800}

simple-car:
  cors:
    allowed-origin-patterns: "${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://[::1]:*}"

upload:
  path: "${UPLOAD_PATH:./uploads/}"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:true}
